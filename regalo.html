<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<title>La tua sorpresa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;

background-image:url("https://images.squarespace-cdn.com/content/v1/5d9b8963d30aa503529bfb1a/1730743187163-ZS8DY2VKZCY5XYZSHTCC/Prova2.png");

background-size:cover;
background-position:center;

}

.overlay{

position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);

}

.container{

position:relative;
z-index:2;
animation:reveal 3s ease;

}

h2{

font-weight:300;
font-size:30px;
margin-bottom:10px;

}

h1{

font-size:55px;
margin-bottom:20px;

}

.concert{

font-size:65px;
color:#ff4e8a;

text-shadow:0 0 20px rgba(255,78,138,0.8);

}

p{

font-size:22px;

}

@keyframes reveal{

from{
opacity:0;
transform:translateY(50px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="container">

<h2>Preparati...</h2>

<h1>IL TUO REGALO È</h1>

<h1 class="concert">
IL CONCERTO DI MARRACASH 🎤🔥
</h1>

<p>
Non vedo l'ora di viverlo insieme a te ❤️
</p>

</div>


<!-- musica da YouTube -->

<iframe width="0" height="0"
src="https://www.youtube.com/embed/3W3ZkX3lXnM?autoplay=1&loop=1&playlist=3W3ZkX3lXnM"
frameborder="0"
allow="autoplay">
</iframe>


</body>

</html>
