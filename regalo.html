<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La tua sorpresa</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            overflow: hidden;
            background: #000 url("https://images.squarespace-cdn.com");
            background-size: cover;
            background-position: center;
            font-family: 'Montserrat', sans-serif;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            padding: 20px;
            animation: slideIn 1.2s ease-out;
        }

        h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 38px;
            color: #ffb7c5; /* Rosa pastello morbido */
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .gift-title {
            font-weight: 900;
            font-size: clamp(1.8rem, 6vw, 3rem);
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .concert {
            font-size: clamp(2.8rem, 12vw, 6rem);
            font-weight: 900;
            line-height: 0.9;
            margin: 25px 0;
            /* Colore Marracash Style: Oro/Platino con effetto metallico */
            background: linear-gradient(135deg, #fff 0%, #ff4e8a 50%, #8a2be2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 78, 138, 0.4));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .details {
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            font-weight: 400;
            margin-top: 20px;
            color: #e0e0e0;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Scritta Ti Amo Dinamica */
        .ti-amo {
            margin-top: 40px;
            font-family: 'Dancing Script', cursive;
            font-size: 28px;
            color: #ff4e8a;
            display: block;
            animation: pulseLove 2s infinite;
        }

        @keyframes pulseLove {
            0% { transform: scale(1); opacity: 0.8; text-shadow: 0 0 0px #ff4e8a; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 15px #ff4e8a; }
            100% { transform: scale(1); opacity: 0.8; text-shadow: 0 0 0px #ff4e8a; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

    </style>
</head>
<body onclick="startAudio()">

<div class="overlay"></div>

<div class="container">
    <h2>E infine...</h2>
    <h1 class="gift-title">IL TUO REGALO È</h1>
    
    <h1 class="concert">
        MARRACASH <br>
        <span style="font-size: 0.6em;">LIVE 2025</span>
    </h1>

    <p class="details">
        Non potevo scegliere di meglio che portarti a vedere il King insieme a me. ❤️
    </p>

    <span class="ti-amo">Ti amo amore mio</span>
</div>

<!-- Audio Locale -->
<audio id="myAudio" loop>
    <source src="lei.mp3" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById("myAudio");

    function startAudio() {
        audio.play().catch(e => console.log("Clicca per avviare l'audio"));
    }

    // Prova auto-start
    window.onload = () => {
        audio.volume = 0.8;
        audio.play();
    };
</script>

</body>
</html>
