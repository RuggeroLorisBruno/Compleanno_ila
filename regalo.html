<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La tua sorpresa</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            overflow: hidden;
            background: #000 url("https://images.squarespace-cdn.com");
            background-size: cover;
            background-position: center;
            font-family: 'Montserrat', sans-serif;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.65);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            padding: 20px;
            animation: reveal 2s ease-out;
        }

        h2 {
            font-weight: 300;
            font-size: 30px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .gift-title {
            font-size: clamp(2rem, 8vw, 55px);
            margin-bottom: 10px;
            font-weight: 900;
        }

        .concert {
            font-size: clamp(2.5rem, 10vw, 4.5rem);
            font-weight: 900;
            color: #ff4e8a;
            text-shadow: 0 0 20px rgba(255,78,138,0.8);
            margin: 20px 0;
            text-transform: uppercase;
            animation: pulse 2s infinite ease-in-out;
            line-height: 1.1;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .details {
            font-size: 22px;
            margin-top: 15px;
            font-weight: 300;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .ti-amo {
            margin-top: 35px;
            font-family: 'Dancing Script', cursive;
            font-size: 35px;
            color: #ff4e8a;
            display: block;
            animation: glowLove 2.5s infinite;
        }

        @keyframes glowLove {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body onclick="startAudio()">

<div class="overlay"></div>

<div class="container">
    <h2>Preparati...</h2>
    <h1 class="gift-title">IL TUO REGALO È</h1>
    
    <h1 class="concert">
        IL CONCERTO DI <br>MARRACASH 2026 🎤🔥
    </h1>

    <p class="details">
        Non potevo scegliere di meglio che portarti a vedere il King insieme a me. ❤️<br>
        Non vedo l'ora di viverlo insieme a te.
    </p>

    <span class="ti-amo">Ti amo amore mio</span>
</div>

<audio id="myAudio" loop>
    <source src="lei.mp3" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById("myAudio");

    function startAudio() {
        audio.play().catch(e => console.log("Audio attivo"));
    }

    window.onload = () => {
        audio.volume = 0.8;
        // Tenta l'auto-play, ma richiede il click dell'utente per policy browser
        audio.play().catch(() => {
            console.log("Clicca sulla pagina per la musica");
        });
    };
</script>

</body>
</html>
