<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La tua sorpresa</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            overflow: hidden;
            background: #000 url("https://images.squarespace-cdn.com/content/v1/5d9b8963d30aa503529bfb1a/1730743187163-ZS8DY2VKZCY5XYZSHTCC/Prova2.png");
            background-size: cover;
            background-position: center;
            font-family: 'Montserrat', sans-serif;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            padding: 20px;
            animation: slideIn 1.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 35px;
            color: #ff85a1;
            margin-bottom: 5px;
        }

        .gift-title {
            font-weight: 900;
            font-size: clamp(2rem, 8vw, 4rem);
            letter-spacing: -2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .concert {
            font-size: clamp(2.5rem, 10vw, 5.5rem);
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            line-height: 1;
            margin: 20px 0;
            background: linear-gradient(to bottom, #ff4e8a, #ff1493);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 78, 138, 0.6));
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(255, 78, 138, 0.5)); transform: scale(1); }
            to { filter: drop-shadow(0 0 25px rgba(255, 78, 138, 0.9)); transform: scale(1.02); }
        }

        .details {
            font-size: 24px;
            font-weight: 300;
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 2s forwards 1.5s;
        }

        .highlight {
            color: #ff4e8a;
            font-weight: 600;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(100px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Effetto flash per il ritmo */
        .flash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .active-flash {
            animation: flashAnim 0.4s ease-out;
        }

        @keyframes flashAnim {
            0% { opacity: 0.3; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body onclick="startAudio()">

<div class="overlay"></div>
<div class="flash-overlay" id="flash"></div>

<div class="container">
    <h2>Preparati perché...</h2>
    <h1 class="gift-title">IL TUO REGALO È</h1>
    
    <h1 class="concert">
        MARRACASH <br>
        <span style="font-size: 0.5em; vertical-align: middle;">🎤</span> LIVE 2025 <span style="font-size: 0.5em; vertical-align: middle;">🔥</span>
    </h1>

    <p class="details">
        Andiamo a vederlo <span class="highlight">insieme</span>.<br>
        Sarà una notte indimenticabile, proprio come te. ❤️
    </p>
</div>

<!-- Audio Locale -->
<audio id="myAudio" loop>
    <source src="lei.mp3" type="audio/mpeg">
    Il tuo browser non supporta l'audio.
</audio>

<script>
    const audio = document.getElementById("myAudio");
    const flash = document.getElementById("flash");

    // L'audio parte al primo click dell'utente sulla pagina (obbligatorio per i browser moderni)
    function startAudio() {
        audio.play().catch(e => console.log("Audio in attesa di interazione"));
        triggerFlash();
    }

    // Prova ad avviare l'audio automaticamente (potrebbe non funzionare senza click)
    window.onload = () => {
        audio.volume = 0.7;
        audio.play();
    };

    // Effetto visivo a tempo
    function triggerFlash() {
        setInterval(() => {
            flash.classList.add('active-flash');
            setTimeout(() => flash.classList.remove('active-flash'), 400);
        }, 3000);
    }
</script>

</body>
</html>
