<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>La tua sorpresa</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            overflow: hidden;
            /* TUO METODO ORIGINALE DI CARICAMENTO IMMAGINE */
            background-image: url("https://images.squarespace-cdn.com");
            background-size: cover;
            background-position: center;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            animation: reveal 3s ease;
            padding: 20px;
        }

        h2 {
            font-weight: 300;
            font-size: 30px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 55px;
            margin-bottom: 20px;
        }

        .concert {
            font-size: clamp(40px, 10vw, 65px);
            color: #ff4e8a;
            text-shadow: 0 0 20px rgba(255, 78, 138, 0.8);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .details {
            font-size: 22px;
            line-height: 1.4;
        }

        .ti-amo {
            display: block;
            margin-top: 40px;
            font-family: 'Dancing Script', cursive;
            font-size: 40px;
            color: #ff4e8a;
            animation: pulse Love 2s infinite ease-in-out;
        }

        @keyframes pulseLove {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body onclick="startAudio()">

    <div class="overlay"></div>

    <div class="container">
        <h2>Preparati...</h2>
        <h1>IL TUO REGALO È</h1>

        <div class="concert">
            IL CONCERTO DI <br>MARRACASH 2026 🎤
        </div>

        <p class="details">
            Non potevo scegliere di meglio che portarti a vedere il King insieme a me. ❤️<br>
            Non vedo l'ora di viverlo insieme a te.
        </p>

        <span class="ti-amo">Ti amo amore mio</span>
    </div>

    <!-- Audio Locale -->
    <audio id="myAudio" loop>
        <source src="lei.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById("myAudio");

        function startAudio() {
            audio.play().catch(e => console.log("Audio in riproduzione"));
        }

        // Tentativo di autoplay al caricamento
        window.onload = () => {
            audio.volume = 0.8;
            audio.play().catch(() => {
                console.log("Clicca sulla pagina per attivare la musica");
            });
        };
    </script>

</body>

</html>
