<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>La tua sorpresa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;

background-image:url("https://images.squarespace-cdn.com/content/v1/5d9b8963d30aa503529bfb1a/1730743187163-ZS8DY2VKZCY5XYZSHTCC/Prova2.png");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:1;
}

.container{
position:relative;
z-index:2;
padding:20px;
}

.preparati{
font-size:40px;
animation:fadeIn 2s ease;
}

/* COUNTDOWN GIGANTE */

.countdown{
font-size:clamp(120px,20vw,250px);
font-weight:900;
color:white;
text-shadow:
0 0 20px #ff4e8a,
0 0 40px #ff4e8a,
0 0 80px #ff4e8a;
margin-top:20px;
opacity:0;
transition:opacity 0.5s ease;
}

/* TITOLO CONCERTO */

.concert-title{

font-size:clamp(70px,12vw,140px);
font-weight:900;

color:#ff4e8a;

text-shadow:
0 0 10px white,
0 0 30px #ff4e8a,
0 0 60px #ff4e8a,
0 0 120px #ff4e8a;

opacity:0;

animation:glowPulse 2s infinite alternate;

}

@keyframes glowPulse{

from{
text-shadow:
0 0 10px white,
0 0 30px #ff4e8a,
0 0 60px #ff4e8a;
}

to{
text-shadow:
0 0 20px white,
0 0 60px #ff4e8a,
0 0 120px #ff4e8a;
}

}

p{
font-size:22px;
line-height:1.4;
opacity:0;
transition:opacity 2s ease;
margin-top:20px;
}

.ti-amo{
display:block;
margin-top:30px;
font-family:'Dancing Script',cursive;
font-size:40px;
color:#ff4e8a;
animation:pulseLove 2.5s infinite ease-in-out;
opacity:0;
transition:opacity 2s ease;
}

@keyframes pulseLove{

0%,100%{transform:scale(1);opacity:0.8;}

50%{transform:scale(1.1);opacity:1;}

}

@keyframes fadeIn{

from{opacity:0;}
to{opacity:1;}

}

canvas{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;

}

</style>
</head>

<body onclick="startAudio()">

<div class="overlay"></div>

<canvas id="fireworks"></canvas>

<div class="container">

<h2 class="preparati">Preparati...</h2>

<div class="countdown" id="countdown">5</div>

<h1 class="concert-title" id="concertTitle">
MARRACASH LIVE 2026
</h1>

<p id="concertPara">
Non potevo scegliere di meglio che portarti a vedere il King insieme a me ❤️
<br>
Sarà una serata incredibile e non vedo l'ora di viverla insieme a te.
</p>

<span class="ti-amo" id="concertLove">
Ti amo amore mio
</span>

</div>

<audio id="myAudio" loop>
<source src="lei.mp3" type="audio/mpeg">
</audio>

<script>

const audio = document.getElementById("myAudio");

function startAudio(){
audio.play().catch(e => console.log("Audio attivo"));
}

window.onload = () => {

audio.volume = 0.8;

audio.play().catch(()=>{});

setTimeout(startCountdown,5000);

};

function startCountdown(){

const countdownEl = document.getElementById("countdown");

countdownEl.style.opacity = 1;

let count = 5;

const interval = setInterval(()=>{

countdownEl.textContent = count;

count--;

if(count < 0){

clearInterval(interval);

countdownEl.style.opacity = 0;

showConcertText();

}

},1000);

}

function showConcertText(){

const title = document.getElementById("concertTitle");
const para = document.getElementById("concertPara");
const love = document.getElementById("concertLove");

title.style.opacity = 1;

explodeFireworks();

// testo dopo 2 secondi

setTimeout(()=>{

para.style.opacity = 1;

},2000);

// ti amo dopo altri 2 secondi

setTimeout(()=>{

love.style.opacity = 1;

},4000);

}

/* FUOCHI D'ARTIFICIO */

const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];

function explodeFireworks(){

for(let i=0;i<80;i++){

particles.push({

x:canvas.width/2,
y:canvas.height/2,
vx:(Math.random()-0.5)*8,
vy:(Math.random()-0.5)*8,
life:100

});

}

requestAnimationFrame(updateFireworks);

}

function updateFireworks(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{

ctx.beginPath();

ctx.arc(p.x,p.y,3,0,Math.PI*2);

ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;

ctx.fill();

p.x+=p.vx;

p.y+=p.vy;

p.life--;

if(p.life<=0) particles.splice(i,1);

});

requestAnimationFrame(updateFireworks);

}

</script>

</body>
</html>
