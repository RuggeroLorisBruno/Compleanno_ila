<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>La tua sorpresa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;

background-image:url("https://images.squarespace-cdn.com/content/v1/5d9b8963d30aa503529bfb1a/1730743187163-ZS8DY2VKZCY5XYZSHTCC/Prova2.png");
background-size:cover;
background-position:center;

}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
}

.container{

position:relative;
z-index:2;
width:90%;
max-width:800px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

}

/* PREPARATI */

.preparati{

font-size:40px;
margin-bottom:20px;

}

/* COUNTDOWN */

.countdown{

font-size:clamp(120px,18vw,220px);
font-weight:900;

color:#ff4e8a;

text-shadow:
0 0 20px #ff4e8a,
0 0 40px #ff4e8a,
0 0 80px #ff4e8a;

display:none;

}

/* TESTI */

.concert{

font-size:clamp(60px,10vw,100px);
font-weight:900;

color:#ff4e8a;

text-shadow:
0 0 10px white,
0 0 30px #ff4e8a,
0 0 60px #ff4e8a;

margin-bottom:20px;

opacity:0;
transition:opacity 2s;

}

.phrase{

font-size:22px;
margin-top:20px;

opacity:0;
transition:opacity 2s;

}

.ti-amo{

display:block;
margin-top:30px;

font-family:'Dancing Script',cursive;
font-size:40px;

color:#ff4e8a;

animation:pulseLove 2.5s infinite;

opacity:0;
transition:opacity 2s;

}

@keyframes pulseLove{

0%,100%{transform:scale(1);}
50%{transform:scale(1.1);}

}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<h2 id="preparati" class="preparati">Preparati...</h2>

<div id="countdown" class="countdown">5</div>

<h1 id="concert" class="concert">
🎤 MARRACASH LIVE 2026 🔥
</h1>

<p id="phrase" class="phrase">
Non potevo scegliere regalo migliore che vivere questo concerto insieme a te ❤️
</p>

<span id="love" class="ti-amo">
Ti amo amore mio
</span>

</div>

<audio id="myAudio" autoplay loop>
<source src="lei.mp3" type="audio/mpeg">
</audio>

<script>

const audio=document.getElementById("myAudio");

window.onload=()=>{

audio.volume=0.8;

audio.play().catch(()=>{});

setTimeout(startCountdown,3000);

}

function startCountdown(){

const preparati=document.getElementById("preparati");
const countdown=document.getElementById("countdown");

preparati.style.display="none";

countdown.style.display="block";

let count=5;

const interval=setInterval(()=>{

countdown.textContent=count;

count--;

if(count<0){

clearInterval(interval);

countdown.style.display="none";

showText();

}

},1000);

}

function showText(){

const concert=document.getElementById("concert");
const phrase=document.getElementById("phrase");
const love=document.getElementById("love");

concert.style.opacity=1;

setTimeout(()=>{

phrase.style.opacity=1;

},2000);

setTimeout(()=>{

love.style.opacity=1;

},4000);

}

</script>

</body>
</html>
