<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<title>Buon Compleanno Amore</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background: linear-gradient(-45deg,#ff1493,#ff69b4,#ff00ff,#9d4edd,#3a86ff,#06ffa5);
background-size:600% 600%;
animation:gradient 18s ease infinite;

color:white;

}

@keyframes gradient{

0%{background-position:0% 50%;}
25%{background-position:100% 50%;}
50%{background-position:50% 100%;}
75%{background-position:0% 50%;}
100%{background-position:0% 50%;}

}

.container{

text-align:center;
z-index:2;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);

animation:fadeUp 2s ease;

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);

}

}
h1{

font-size:50px;
font-weight:700;
margin-bottom:10px;

}
h2{

font-weight:300;
margin-bottom:25px;

}
.photo-frame{

width:300px;
height:300px;

margin:auto;

border-radius:20px;

overflow:hidden;

position:relative;

box-shadow:0 15px 40px rgba(0,0,0,0.4);

}

.photo-frame img{

width:100%;
height:100%;
object-fit:cover;

transition:transform 1s;

}

.photo-frame:hover img{

transform:scale(1.1);

}

.btn{

margin-top:30px;

padding:15px 40px;

font-size:20px;

border:none;

border-radius:40px;

cursor:pointer;

background:white;

color:#ff1493;

transition:0.4s;

}

.btn:hover{

transform:scale(1.1);
box-shadow:0 10px 30px rgba(0,0,0,0.3);

}

canvas{

position:absolute;
top:0;
left:0;

}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<h1>Tanti Auguri Amore Mio ❤️</h1>

<h2>Buon 22° Compleanno</h2>

<div class="photo-frame">

<img src="IMG_7455.JPG">

</div>

<br>

<p>
Questa è solo la prima sorpresa...
</p>

<br>

<a href="regalo.html">

<button class="btn">
Scopri il tuo regalino fofumato🎁
</button>

</a>

</div>

<audio autoplay loop>
<source src="lei.mp3" type="audio/mpeg">
</audio>

<script>

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

const colors = ['rgba(255,20,147,0.8)', 'rgba(255,105,180,0.8)', 'rgba(255,0,255,0.8)', 'rgba(157,78,221,0.8)', 'rgba(58,134,255,0.8)', 'rgba(6,255,165,0.8)'];

for(let i=0;i<120;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*4+1,
speed:Math.random()*1+0.3,
color:colors[Math.floor(Math.random()*colors.length)]

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.fillStyle=p.color;

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

p.y -= p.speed;
p.x += Math.sin(p.y*0.01)*0.5;

if(p.y < 0){

p.y = canvas.height;
p.x = Math.random()*canvas.width;

}

})

requestAnimationFrame(draw);

}

draw();

window.addEventListener('resize',()=>{
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
});

</script>

</body>

</html>
